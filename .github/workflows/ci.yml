name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CI installs with npm; the committed pnpm-lock.yaml (kept for local pnpm
      # dev) makes Nx 23 try to parse it for the project graph and fail with
      # "Could not find .modules.yaml". Remove it in the runner so Nx resolves
      # via package-lock.json. Does not affect the repo or local development.
      - name: Drop pnpm lockfile (CI uses npm)
        run: rm -f pnpm-lock.yaml

      - name: Generate Prisma client (launcher)
        run: npx prisma generate --schema apps/launcher/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build
        run: npx nx run-many -t build --projects=design-system,web-eg,web-ae,brand,launcher

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Test
        run: npm run test --if-present
