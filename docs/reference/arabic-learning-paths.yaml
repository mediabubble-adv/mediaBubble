# =============================================================================
# RECOMMENDED SEQUENCES (SUGGESTED TRACK ORDERINGS)
# =============================================================================
# For different user personas, which track order optimizes the learning curve.
# =============================================================================

recommendedSequences:
  - persona: "General Learner"
    description: "Wants broad Arabic cultural and linguistic literacy"
    order: [A, N, K, L, F, B, I]
    notes: "Start with core linguistics + history; then culture, then literature/dialect"

  - persona: "Academic Researcher"
    description: "Focus on classical texts, manuscripts, and deep linguistic analysis"
    order: [A, N, C, D, F, M, E, O]
    notes: "Prioritize grammar, lexicography, then manuscripts and Islamic sciences"

  - persona: "Translator / Interpreter"
    description: "Professional translation between Arabic and other languages"
    order: [A, B, C, F, G, D, J]
    notes: "Linguistic foundations first, then dialect + literature, then translation track"

  - persona: "Media Professional"
    description: "Journalist, broadcaster, or media analyst covering the Arab world"
    order: [A, N, B, I, K, F]
    notes: "History + dialect for context; media as main track"

  - persona: "Language Teacher (TAFL)"
    description: "Teaching Arabic as a foreign language"
    order: [A, B, H, C, J]
    notes: "Master the language itself, then pedagogy, then assessment tech"

  - persona: "Digital / Computational Linguist"
    description: "Building Arabic NLP systems, speech tech, or AI models"
    order: [A, J, C, B, M]
    notes: "Deep linguistics first; computational Arabic is the main track"

  - persona: "Cultural / Heritage Professional"
    description: "Museum curator, archivist, cultural heritage specialist"
    order: [N, K, L, M, F]
    notes: "History + culture → arts → manuscripts → literature"

  - persona: "Religious / Islamic Studies Scholar"
    description: "Academic or institutional study of Islam"
    order: [D, E, A, N, C, O]
    notes: "Quran first, then Islamic sciences; pick up linguistics alongside"

# =============================================================================
# PLATFORM RECOMMENDATION LOGIC
# =============================================================================
# Rules for MediaBubble's skill-mapping engine.
# =============================================================================

recommendationLogic:
  trackUnlockRule: "Track is unlocked when all source tracks in tracksUnlocked have minimum level 2 in their capstone node"
  nodeUnlockRule: "Node is unlocked when ALL prerequisite nodes reach the required level"
  concurrencyRule: "Nodes within a single track can be taken in parallel if they share no prerequisite chain — e.g., 1.1/1.4/1.2 (dialects) are parallel"
  placementTestMapping:
    "8.5@3 + 8.2@2 + 8.1@2": "Start at Track C (Lexicography) or Track D (Quran)"
    "8.5@2 + 8.2@1": "Start at Track A sequence position 3 (Nahw)"
    "8.1@3 + 8.3@2 + 9.1@2": "Place into Track F (Literature) directly"
    "1.1@3 or 1.4@3": "Place into Track B at sequence position 4 (Cross-Dialectal)"
